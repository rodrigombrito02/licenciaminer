# Nixpacks (builder padrao Railway). Garante deps de sistema para geopandas
# (gdal/geos/proj) e instala requirements.txt em venv isolado.
[phases.setup]
nixPkgs = ["python311", "gcc", "gdal", "geos", "proj"]

[phases.install]
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt",
]

[start]
cmd = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
